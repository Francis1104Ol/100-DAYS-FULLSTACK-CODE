<!DOCTYPE html>
<html>
<head>
    <title>Product Page</title>
</head>
<body>

    <div class="products-list">

        <div class="products-detail">
             <div class="products-img">
                <img src={{%IMAGE%}} alt="" height="120" width="120">
             </div>
            <div class="product-specs">
                <h3>iPhone 13</h3>
                <p><span>Model Name:</span> {{%MODELNAME%}}</p>
                <p><span>Model Number:</span> {{%MODELNO%}}</p>
                <p><span>Size:</span>{{%SIZE%}}</p>
                <p><span>Camera:</span>{{%CAMERA%}}</p>
        </div>

        <div class="products-detail">
            <div class="product-info"><h4>{{%PRICE%}}</h4></div>
            <div class="product-info"><h4>{{%COLOR%}}</h4></div>
            <div class="product-info">
               
                <a href="/products?id={{%ID%}}" class="btn btn-secondary">Show </a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
